[tool.coverage.paths]
source = ["src"]

[tool.coverage.run]
branch = true
relative_files = true

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.black]
target-version = ['py310']
extend-exclude = '''
/(
  | .env
  | .venv
  | venv
  | notebooks
  | \*.pyx
)/
'''

[tool.ruff]
ignore = ["E501"]
select = ["E", "F", "I", "W"]
line-length = 150
fixable = ["E", "F", "I"]
exclude = [".env", ".venv", "venv", "notebooks"]
show-source = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "--doctest-modules --doctest-continue-on-failure"
